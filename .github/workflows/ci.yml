name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Wait for dpkg lock
        run: |
          for i in $(seq 1 30); do
            if sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; then
              echo "dpkg lock held, waiting... ($i/30)"
              sleep 10
            else
              break
            fi
          done
      - uses: r-lib/actions/setup-r@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev libuv1-dev
      - name: Install test dependencies
        run: |
          Rscript -e 'install.packages(c("testthat", "XML"), repos = "https://cloud.r-project.org/")'
      - name: Run tests
        run: Rscript -e 'testthat::test_dir("tests/testthat")'

  docker-build:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t epublangmerger .
