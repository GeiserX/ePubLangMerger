name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Clear stale dpkg locks
        run: |
          sudo killall -9 apt-get dpkg gdebi 2>/dev/null || true
          sudo rm -f /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock
          sudo dpkg --configure -a
      - uses: r-lib/actions/setup-r@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev
      - name: Install test dependencies
        run: |
          Rscript -e 'install.packages(c("testthat", "XML"), repos = "https://cloud.r-project.org/")'
      - name: Run tests
        run: Rscript -e 'testthat::test_dir("tests/testthat")'

  docker-build:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t epublangmerger .
