name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Upload an ePub file...
        2. Select languages...
        3. Click merge...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: How are you running the application?
      options:
        - Docker (docker-compose)
        - Docker (manual build)
        - Local R session
    validations:
      required: true
  - type: input
    id: r-version
    attributes:
      label: R Version
      description: Output of `R --version` (if running locally).
      placeholder: "e.g., R 4.4.2"
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., Ubuntu 24.04, macOS 15, Windows 11"
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any error messages or console output.
      render: shell
